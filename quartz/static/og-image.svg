<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F0F14"/>
      <stop offset="50%" style="stop-color:#141419"/>
      <stop offset="100%" style="stop-color:#0D0D11"/>
    </linearGradient>

    <!-- Gold gradient for text -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#B8952F"/>
      <stop offset="30%" style="stop-color:#D4B862"/>
      <stop offset="50%" style="stop-color:#E8D090"/>
      <stop offset="70%" style="stop-color:#D4B862"/>
      <stop offset="100%" style="stop-color:#B8952F"/>
    </linearGradient>

    <!-- Subtle gold for ornaments -->
    <linearGradient id="goldSoft" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#B8952F;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#C9A84C;stop-opacity:0.6"/>
      <stop offset="50%" style="stop-color:#D4B862;stop-opacity:0.8"/>
      <stop offset="70%" style="stop-color:#C9A84C;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#B8952F;stop-opacity:0"/>
    </linearGradient>

    <!-- Radial glow behind title -->
    <radialGradient id="glow" cx="50%" cy="42%" r="35%">
      <stop offset="0%" style="stop-color:#C9A84C;stop-opacity:0.06"/>
      <stop offset="100%" style="stop-color:#C9A84C;stop-opacity:0"/>
    </radialGradient>

    <!-- Corner accent gradient -->
    <radialGradient id="cornerTL" cx="0%" cy="0%" r="60%">
      <stop offset="0%" style="stop-color:#C9A84C;stop-opacity:0.03"/>
      <stop offset="100%" style="stop-color:#C9A84C;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="cornerBR" cx="100%" cy="100%" r="60%">
      <stop offset="0%" style="stop-color:#C9A84C;stop-opacity:0.03"/>
      <stop offset="100%" style="stop-color:#C9A84C;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bg)"/>

  <!-- Subtle corner glows -->
  <rect width="1200" height="675" fill="url(#cornerTL)"/>
  <rect width="1200" height="675" fill="url(#cornerBR)"/>

  <!-- Center glow -->
  <rect width="1200" height="675" fill="url(#glow)"/>

  <!-- Thin border frame -->
  <rect x="40" y="40" width="1120" height="595" rx="2" ry="2"
        fill="none" stroke="#C9A84C" stroke-opacity="0.12" stroke-width="1"/>
  <rect x="52" y="52" width="1096" height="571" rx="1" ry="1"
        fill="none" stroke="#C9A84C" stroke-opacity="0.06" stroke-width="0.5"/>

  <!-- Top ornament line -->
  <line x1="440" y1="180" x2="540" y2="180" stroke="url(#goldSoft)" stroke-width="1"/>
  <text x="565" y="185" font-family="Georgia, 'Times New Roman', serif" font-size="16" fill="#C9A84C" fill-opacity="0.7" text-anchor="middle">✦</text>
  <text x="600" y="185" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#C9A84C" fill-opacity="0.5" text-anchor="middle">✦</text>
  <text x="635" y="185" font-family="Georgia, 'Times New Roman', serif" font-size="16" fill="#C9A84C" fill-opacity="0.7" text-anchor="middle">✦</text>
  <line x1="660" y1="180" x2="760" y2="180" stroke="url(#goldSoft)" stroke-width="1"/>

  <!-- Main title -->
  <text x="600" y="270" font-family="'Georgia', 'Times New Roman', serif" font-size="62"
        fill="url(#gold)" text-anchor="middle" letter-spacing="16" font-weight="400">
    STAR RESEARCH
  </text>

  <!-- Subtitle -->
  <text x="600" y="320" font-family="'Georgia', 'Times New Roman', serif" font-size="18"
        fill="#8E8E93" text-anchor="middle" letter-spacing="8" font-weight="400">
    INVESTMENT INTELLIGENCE
  </text>

  <!-- Bottom ornament line -->
  <line x1="440" y1="365" x2="540" y2="365" stroke="url(#goldSoft)" stroke-width="1"/>
  <text x="565" y="370" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#C9A84C" fill-opacity="0.5" text-anchor="middle">✦</text>
  <text x="600" y="370" font-family="Georgia, 'Times New Roman', serif" font-size="16" fill="#C9A84C" fill-opacity="0.7" text-anchor="middle">✦</text>
  <text x="635" y="370" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#C9A84C" fill-opacity="0.5" text-anchor="middle">✦</text>
  <line x1="660" y1="365" x2="760" y2="365" stroke="url(#goldSoft)" stroke-width="1"/>

  <!-- Tagline / Description -->
  <text x="600" y="430" font-family="'Georgia', 'Times New Roman', serif" font-size="15"
        fill="#6E6E73" text-anchor="middle" letter-spacing="1" font-style="italic">
    AI-Driven Market Analysis &amp; Investment Research
  </text>

  <!-- Category pills row -->
  <!-- Briefing -->
  <rect x="270" y="470" width="95" height="30" rx="15" fill="#C9A84C" fill-opacity="0.08" stroke="#C9A84C" stroke-opacity="0.2" stroke-width="0.5"/>
  <text x="317" y="490" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#D4B862" text-anchor="middle" letter-spacing="0.5">📰 Briefing</text>

  <!-- Scan -->
  <rect x="380" y="470" width="75" height="30" rx="15" fill="#C9A84C" fill-opacity="0.08" stroke="#C9A84C" stroke-opacity="0.2" stroke-width="0.5"/>
  <text x="417" y="490" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#D4B862" text-anchor="middle" letter-spacing="0.5">⚡ Scan</text>

  <!-- Deal -->
  <rect x="470" y="470" width="70" height="30" rx="15" fill="#C9A84C" fill-opacity="0.08" stroke="#C9A84C" stroke-opacity="0.2" stroke-width="0.5"/>
  <text x="505" y="490" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#D4B862" text-anchor="middle" letter-spacing="0.5">📊 Deal</text>

  <!-- Deep -->
  <rect x="555" y="470" width="75" height="30" rx="15" fill="#C9A84C" fill-opacity="0.08" stroke="#C9A84C" stroke-opacity="0.2" stroke-width="0.5"/>
  <text x="592" y="490" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#D4B862" text-anchor="middle" letter-spacing="0.5">🔬 Deep</text>

  <!-- Thesis -->
  <rect x="645" y="470" width="80" height="30" rx="15" fill="#C9A84C" fill-opacity="0.08" stroke="#C9A84C" stroke-opacity="0.2" stroke-width="0.5"/>
  <text x="685" y="490" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#D4B862" text-anchor="middle" letter-spacing="0.5">🎯 Thesis</text>

  <!-- Archives -->
  <rect x="740" y="470" width="90" height="30" rx="15" fill="#C9A84C" fill-opacity="0.08" stroke="#C9A84C" stroke-opacity="0.2" stroke-width="0.5"/>
  <text x="785" y="490" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#D4B862" text-anchor="middle" letter-spacing="0.5">📂 Archives</text>

  <!-- Domain -->
  <text x="600" y="580" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14"
        fill="#C9A84C" fill-opacity="0.5" text-anchor="middle" letter-spacing="3">
    dlonestar.com
  </text>
</svg>
